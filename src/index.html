<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Plataforma educativa offline-first para aprender inglés en zonas rurales de Colombia. Proyecto de Ingeniería I — UNAD. Grupo 57.">
  <meta name="theme-color" content="#00897B">
  <title>Aprende Inglés — Offline-First</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon-192.svg">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="connection-banner" class="connection-banner hidden" role="status" aria-live="polite"></div>

  <header class="app-header">
    <div class="brand" aria-label="Aprende Inglés Offline">Aprende Inglés</div>
    <div class="stats" aria-label="Estadísticas del estudiante">
      <span class="stat" title="Puntos">⭐ <span id="stat-points">0</span></span>
      <span class="stat" title="Racha en días">🔥 <span id="stat-streak">0</span></span>
      <span class="stat" title="Nivel actual">🎓 <span id="stat-level">1</span></span>
    </div>
  </header>

  <main id="app" class="app-main" aria-live="polite">
    <p class="muted text-center">Cargando…</p>
  </main>

  <nav class="app-nav" role="navigation" aria-label="Navegación principal">
    <button data-view="dashboard" class="nav-btn active" type="button" aria-label="Inicio">
      <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M3 11.2 12 4l9 7.2V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      </svg>
      <span class="nav-label">Inicio</span>
    </button>
    <button data-view="learn" class="nav-btn" type="button" aria-label="Aprender">
      <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4H11v15H5.5A1.5 1.5 0 0 1 4 17.5zM20 5.5A1.5 1.5 0 0 0 18.5 4H13v15h5.5a1.5 1.5 0 0 0 1.5-1.5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      </svg>
      <span class="nav-label">Aprender</span>
    </button>
    <button data-view="lesson" class="nav-btn" type="button" aria-label="Lección">
      <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="m4 20 1-4L16.5 4.5a2.1 2.1 0 0 1 3 3L8 19l-4 1z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="m14.5 6.5 3 3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span class="nav-label">Lección</span>
    </button>
    <button data-view="profile" class="nav-btn" type="button" aria-label="Perfil">
      <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <circle cx="12" cy="8" r="3.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
        <path d="M5 20a7 7 0 0 1 14 0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span class="nav-label">Perfil</span>
    </button>
  </nav>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((reg) => console.log('[SW] Registrado en scope:', reg.scope))
          .catch((err) => console.warn('[SW] Registro falló:', err));
      });
    }
  </script>
  <script src="js/seed-data.js"></script>
  <script src="js/seed-topics.js"></script>
  <script src="js/db.js"></script>
  <script src="js/leitner.js"></script>
  <script src="js/gamification.js"></script>
  <script src="js/onboarding.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
